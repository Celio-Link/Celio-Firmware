<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBLink Firmware Test</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e6eb;
            --text-dim: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .connect-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: var(--success);
        }

        #statusText {
            flex: 1;
            color: var(--text-dim);
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2 .icon {
            font-size: 1.3rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-gba {
            background: #7c3aed;
        }

        .btn-gba:hover {
            background: #6d28d9;
        }

        .btn-gb {
            background: #059669;
        }

        .btn-gb:hover {
            background: #047857;
        }

        .btn-3v3 {
            background: #0891b2;
        }

        .btn-3v3:hover {
            background: #0e7490;
        }

        .btn-5v {
            background: #d97706;
        }

        .btn-5v:hover {
            background: #b45309;
        }

        .led-controls {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .led-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #colorPicker {
            width: 60px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }

        .led-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }

        #log {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: var(--text-dim);
        }

        .log-entry {
            margin-bottom: 2px;
        }

        .log-entry.send {
            color: #60a5fa;
        }

        .log-entry.recv {
            color: #34d399;
        }

        .log-entry.error {
            color: #f87171;
        }

        .log-entry.info {
            color: #a78bfa;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .log-header h2 {
            margin-bottom: 0;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
        }
    </style>
</head>

<body>
    <h1>🎮 GBLink Firmware Test</h1>
    <p class="subtitle">WebUSB test page for unified firmware — mode switching, voltage, LED control</p>

    <div class="connect-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
        <span id="fwInfo" style="color: var(--text-dim); font-size: 0.85rem;"></span>
        <button id="connectBtn" onclick="toggleConnect()">Connect</button>
    </div>

    <div class="sections">
        <!-- Mode Switching -->
        <div class="card">
            <h2><span class="icon">🔄</span> Mode Switching</h2>
            <div class="btn-group">
                <button class="btn-gba" onclick="sendMode(0x00)" disabled id="btn-emu">
                    GBA Trade Emu (0x00)
                </button>
                <button class="btn-gba" onclick="sendMode(0x01)" disabled id="btn-link">
                    GBA Link (0x01)
                </button>
                <button class="btn-gb" onclick="sendMode(0x02)" disabled id="btn-gb">
                    GB Link (0x02)
                </button>
                <button onclick="sendCancel()" disabled id="btn-cancel" style="background: var(--danger);">
                    Cancel (0x01)
                </button>
            </div>
        </div>

        <!-- Voltage Switching -->
        <div class="card">
            <h2><span class="icon">⚡</span> Voltage Switching</h2>
            <div class="btn-group">
                <button class="btn-3v3" onclick="sendHardware(0x40)" disabled id="btn-3v3">
                    3.3V (0x40)
                </button>
                <button class="btn-5v" onclick="sendHardware(0x41)" disabled id="btn-5v">
                    5V (0x41)
                </button>
            </div>
        </div>

        <!-- LED Control -->
        <div class="card">
            <h2><span class="icon">💡</span> LED Control</h2>
            <div class="led-controls">
                <div class="led-row">
                    <input type="color" id="colorPicker" value="#6c63ff">
                    <div class="led-preview" id="ledPreview" style="background: #6c63ff;"></div>
                    <button onclick="sendLED(true)" disabled id="btn-led-on">LED On</button>
                    <button onclick="sendLED(false)" disabled id="btn-led-off" style="background: #64748b;">LED
                        Off</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Log -->
    <div class="log-header">
        <h2>📋 Communication Log</h2>
        <button class="btn-clear" onclick="clearLog()">Clear</button>
    </div>
    <div id="log"></div>

    <script>
        let device = null;
        let commandInterface = null;
        let statusInterface = null;
        let commandOutEndpoint = null;
        let statusInEndpoint = null;

        // Celio firmware USB config:
        // Endpoint 1 IN  (0x81) = status/data in
        // Endpoint 1 OUT (0x01) = data out
        // Endpoint 2 IN  (0x82) = command response
        // Endpoint 2 OUT (0x02) = command out

        const allButtons = () => document.querySelectorAll('button[disabled], .btn-group button, .led-controls button');

        function setButtonsEnabled(enabled) {
            const btns = document.querySelectorAll('#btn-emu, #btn-link, #btn-gb, #btn-cancel, #btn-3v3, #btn-5v, #btn-led-on, #btn-led-off');
            btns.forEach(b => b.disabled = !enabled);
        }

        function log(msg, type = 'info') {
            const el = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            entry.textContent = `[${time}] ${msg}`;
            el.appendChild(entry);
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function hexBytes(arr) {
            return Array.from(arr).map(b => '0x' + b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
        }

        async function toggleConnect() {
            if (device) {
                await disconnect();
            } else {
                await connect();
            }
        }

        async function connect() {
            try {
                // Request device — Celio uses WinUSB vendor class
                device = await navigator.usb.requestDevice({
                    filters: [
                        { vendorId: 0xCafe },  // Reconfigurable firmware VID
                        { classCode: 0xFF },   // Vendor class (Celio)
                    ]
                });

                await device.open();
                log(`Connected: ${device.productName || 'USB Device'}`, 'info');

                // Select configuration
                if (device.configuration === null) {
                    await device.selectConfiguration(1);
                }

                // Find the vendor interface and claim it
                const iface = device.configuration.interfaces[0];
                await device.claimInterface(iface.interfaceNumber);
                log(`Claimed interface ${iface.interfaceNumber}`, 'info');

                // Find endpoints
                const alternate = iface.alternate;
                for (const ep of alternate.endpoints) {
                    log(`  EP ${ep.direction} #${ep.endpointNumber} (${ep.type})`, 'info');
                }

                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = `Connected — ${device.productName || 'GBLink Device'}`;
                document.getElementById('connectBtn').textContent = 'Disconnect';
                setButtonsEnabled(true);

                // Start listening for responses
                listenForStatus();

                // Query firmware info immediately
                await sendCommand([0x0F]);

            } catch (err) {
                log(`Connection failed: ${err.message}`, 'error');
            }
        }

        async function disconnect() {
            if (device) {
                try {
                    await device.close();
                } catch (e) { }
                device = null;
            }
            document.getElementById('statusDot').classList.remove('connected');
            document.getElementById('statusText').textContent = 'Disconnected';
            document.getElementById('fwInfo').textContent = '';
            document.getElementById('connectBtn').textContent = 'Connect';
            setButtonsEnabled(false);
            log('Disconnected', 'info');
        }

        async function sendCommand(bytes) {
            if (!device) return;
            const data = new Uint8Array(bytes);
            log(`CMD → ${hexBytes(data)}`, 'send');
            try {
                // Try endpoint 2 first (Celio command endpoint)
                // Fall back to endpoint 1 (vendor bulk for reconfigurable)
                const eps = device.configuration.interfaces[0].alternate.endpoints;
                const outEps = eps.filter(e => e.direction === 'out');

                // Use the highest-numbered OUT endpoint (command endpoint)
                let epNum = outEps.length > 0 ? outEps[outEps.length - 1].endpointNumber : 1;

                const result = await device.transferOut(epNum, data);
                log(`  ✓ Sent ${result.bytesWritten} bytes to EP${epNum}`, 'send');
            } catch (err) {
                log(`  ✗ Send failed: ${err.message}`, 'error');
            }
        }

        async function sendMode(modeId) {
            // Control command: SetMode (0x00) + mode byte
            await sendCommand([0x00, modeId]);
        }

        async function sendCancel() {
            // Control command: Cancel (0x01)
            await sendCommand([0x01]);
        }

        async function sendHardware(cmdId) {
            // Hardware command: just the command byte
            await sendCommand([cmdId]);
        }

        async function sendLED(on) {
            const color = document.getElementById('colorPicker').value;
            const r = parseInt(color.substr(1, 2), 16);
            const g = parseInt(color.substr(3, 2), 16);
            const b = parseInt(color.substr(5, 2), 16);

            // Hardware command: SetLEDColor (0x42) + R, G, B, on/off
            await sendCommand([0x42, r, g, b, on ? 1 : 0]);

            // Update preview
            document.getElementById('ledPreview').style.background = on ? color : '#000';
        }

        async function listenForStatus() {
            while (device) {
                try {
                    const eps = device.configuration.interfaces[0].alternate.endpoints;
                    const inEps = eps.filter(e => e.direction === 'in');

                    if (inEps.length === 0) break;

                    // Use the first IN endpoint (status)
                    const epNum = inEps[0].endpointNumber;
                    const result = await device.transferIn(epNum, 64);

                    if (result.data && result.data.byteLength > 0) {
                        const bytes = new Uint8Array(result.data.buffer);

                        // Check for firmware info response (starts with 0x0F)
                        if (bytes.length >= 4 && bytes[0] === 0x0F) {
                            const ver = `${bytes[1]}.${bytes[2]}.${bytes[3]}`;

                            document.getElementById('fwInfo').textContent = `v${ver}`;
                            log(`FIRMWARE ← v${ver}`, 'recv');
                            continue;
                        }

                        const statusMap = {
                            0xFF00: 'Gameboy Connected',
                            0xFF01: 'Gameboy Disconnected',
                            0xFF02: 'Await Mode',
                            0xFF03: 'Handshake Received',
                            0xFF04: 'Handshake Finished',
                            0xFF05: 'Link Connected',
                            0xFF06: 'Link Reconnecting',
                            0xFF07: 'Link Closed',
                            0xFF08: 'Device Ready',
                            0xFF09: 'Emu Trade Session Finished',
                            0xFF0A: 'GB Mode Active',
                            0xFF0B: 'GB Printer Mode Active',
                            0xFF0C: 'GB Session Finished',
                        };

                        if (bytes.length >= 2) {
                            const statusCode = bytes[0] | (bytes[1] << 8);
                            const statusName = statusMap[statusCode] || `Unknown (0x${statusCode.toString(16)})`;
                            log(`STATUS ← ${statusName} [${hexBytes(bytes)}]`, 'recv');
                        } else {
                            log(`DATA ← ${hexBytes(bytes)}`, 'recv');
                        }
                    }
                } catch (err) {
                    if (device) {
                        // Only log if we're still supposed to be connected
                        if (err.message && !err.message.includes('disconnected')) {
                            log(`Receive error: ${err.message}`, 'error');
                        }
                    }
                    break;
                }
            }
        }

        // Update LED preview when color changes
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            document.getElementById('ledPreview').style.background = e.target.value;
        });

        log('Ready — Click "Connect" to pair with GBLink device', 'info');
    </script>
</body>

</html>
