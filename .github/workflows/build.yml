name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    # softprops/action-gh-release updates the release to attach the .uf2, which
    # needs write access to repo contents. The default GITHUB_TOKEN is read-only,
    # hence "Resource not accessible by integration" without this.
    permissions:
      contents: write
    env:
      ZEPHYR_SDK_VERSION: 0.16.8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: gblink-firmware

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install west
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ccache ninja-build gperf

      - name: Initialize west workspace
        run: |
          west init -l gblink-firmware
          west update
          west zephyr-export

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-${ZEPHYR_SDK_VERSION}
          ./setup.sh -t arm-zephyr-eabi -c

      - name: Install Zephyr Python dependencies
        run: pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        run: west build -b rpi_pico gblink-firmware

      - name: Package firmware
        id: pkg
        # Derive the version from firmware_version.hpp (the single source of
        # truth that also feeds GetFirmwareInfo and bcdDevice), so the file name
        # always matches what the device reports, on every trigger.
        run: |
          major=$(grep -oP 'versionMajor\s*=\s*\K[0-9]+' gblink-firmware/src/firmware_version.hpp)
          minor=$(grep -oP 'versionMinor\s*=\s*\K[0-9]+' gblink-firmware/src/firmware_version.hpp)
          patch=$(grep -oP 'versionPatch\s*=\s*\K[0-9]+' gblink-firmware/src/firmware_version.hpp)
          ver="v${major}.${minor}.${patch}"
          name="gblink.${ver}.uf2"
          cp build/zephyr/zephyr.uf2 "$name"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "file=$name" >> "$GITHUB_OUTPUT"
          echo "Packaged $name"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: gblink.${{ steps.pkg.outputs.version }}
          path: ${{ steps.pkg.outputs.file }}

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.pkg.outputs.file }}
            gblink-firmware/scripts/setup-linux-permissions.sh
